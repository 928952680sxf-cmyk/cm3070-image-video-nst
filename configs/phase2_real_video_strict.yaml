    - name: kandinsky
      path: assets/input/style_kandinsky.jpg
    - name: picasso_window_716
      path: assets/input/style_picasso_window_716.jpg
    - name: picasso_figure_947
      path: assets/input/style_picasso_figure_947.jpg
  videos:
    - id: clip1_park
      path: data/real_videos/clip1.mp4
      start_sec: 1.0
      frame_stride: 6
    - id: clip2_ocean
      path: data/real_videos/clip2_alt.mp4
      start_sec: 8.0
      frame_stride: 7
    - id: clip3_city_flow
      path: data/real_videos/clip3_city_flow.mp4
      start_sec: 1.5
      frame_stride: 7
    - id: clip4_pedestrian
      path: data/real_videos/clip4_pedestrian.mp4
      start_sec: 2.0
      frame_stride: 6
    - id: clip5_market
